<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnTube AI Readiness</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Selection */
    ::selection { background: rgba(168, 85, 247, 0.3); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;
    const { RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis, ResponsiveContainer } = window.Recharts;

    // ─── Config ──────────────────────────────────────────
    const SB_URL = "https://ctindecnqexjzwteigff.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0aW5kZWNucWV4anp3dGVpZ2ZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODM0MTcsImV4cCI6MjA4OTg1OTQxN30.iI-XOxRlN_J2XlK6q78XKgqMHAajMuqd2_791Hok_VE";
    const HEADERS = {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`,
      "Content-Type": "application/json",
    };

    async function query(table, params = "") {
      const res = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: HEADERS });
      if (!res.ok) throw new Error(`${table}: ${res.status} ${res.statusText}`);
      return res.json();
    }

    async function patch(table, id, body) {
      const res = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: "PATCH",
        headers: { ...HEADERS, Prefer: "return=minimal" },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`PATCH ${table}: ${res.status}`);
    }

    // ─── Constants ───────────────────────────────────────
    const ABILITIES = {
      A1: "Delegation", A2: "Communication", A3: "Evaluation", A4: "Iteration",
      A5: "Thinking", A6: "Workflow", A7: "Orchestration", A8: "Multiplication",
    };

    const TIER_COLORS = {
      Explorer: "#6b7280", Practitioner: "#22c55e", Operator: "#3b82f6",
      Strategist: "#a855f7", Architect: "#f97316", Pioneer: "#ef4444",
    };

    const BAND_COLORS = {
      Bronze: "#cd7f32", Silver: "#c0c0c0", Gold: "#ffd700",
      Platinum: "#e5e4e2", Diamond: "#b9f2ff",
    };

    const BAND_THRESHOLDS = {
      Bronze: { min: 0, max: 799 }, Silver: { min: 800, max: 999 },
      Gold: { min: 1000, max: 1199 }, Platinum: { min: 1200, max: 1399 },
      Diamond: { min: 1400, max: Infinity },
    };

    const LEVEL_NAMES = {
      0: "Non-User", 1: "Experimenter", 2: "Functional User",
      3: "Effective Practitioner", 4: "Strategic Deployer",
      5: "System Architect", 6: "Pioneer",
    };

    const QUEUE_ICONS = {
      flash_card: "\uD83C\uDCCF", growth_exercise: "\uD83C\uDFAF",
      trap_review: "\uD83D\uDD34", pending_sharpen: "\u23F3",
    };

    // ─── Helpers ─────────────────────────────────────────
    function timeAgo(dateStr) {
      const now = Date.now();
      const then = new Date(dateStr).getTime();
      const diff = Math.max(0, now - then);
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days === 1) return "yesterday";
      if (days < 30) return `${days}d ago`;
      return new Date(dateStr).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function truncate(str, len) {
      if (!str) return "";
      return str.length > len ? str.substring(0, len) + "..." : str;
    }

    function getBandFromScore(score) {
      for (const [band, range] of Object.entries(BAND_THRESHOLDS)) {
        if (score >= range.min && score <= (range.max === Infinity ? 99999 : range.max)) return band;
      }
      return "Bronze";
    }

    function getNextBand(currentBand, currentScore) {
      const order = ["Bronze", "Silver", "Gold", "Platinum", "Diamond"];
      const idx = order.indexOf(currentBand);
      if (idx === -1 || idx >= order.length - 1) return null;
      const next = order[idx + 1];
      const needed = BAND_THRESHOLDS[next].min - currentScore;
      return { name: next, pointsNeeded: needed };
    }

    // ─── Styles (as objects for inline) ──────────────────
    const S = {
      card: {
        background: "#111111",
        border: "1px solid #222222",
        borderRadius: 16,
        padding: 24,
      },
      cardCompact: {
        background: "#111111",
        border: "1px solid #222222",
        borderRadius: 12,
        padding: 16,
      },
    };

    // ─── Entry Screen ────────────────────────────────────
    function EntryScreen({ onLoad }) {
      const [name, setName] = useState("");

      return (
        <div style={{
          minHeight: "100vh", display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", padding: 24,
          animation: "fadeIn 0.6s ease",
        }}>
          <div style={{ marginBottom: 48, textAlign: "center" }}>
            <div style={{
              width: 64, height: 64, borderRadius: 16,
              background: "linear-gradient(135deg, #a855f7, #6366f1)",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 28, fontWeight: 800, margin: "0 auto 20px",
              boxShadow: "0 0 40px rgba(168, 85, 247, 0.3)",
            }}>LT</div>
            <h1 style={{ fontSize: 28, fontWeight: 700, color: "#fff", marginBottom: 8 }}>
              LearnTube AI Readiness
            </h1>
            <p style={{ fontSize: 15, color: "#6b7280", maxWidth: 360 }}>
              Track your AI abilities. Prove your level. Share your proof card.
            </p>
          </div>

          <div style={{
            display: "flex", gap: 10, width: "100%", maxWidth: 360,
          }}>
            <input
              type="text"
              placeholder="Enter your name"
              value={name}
              onChange={e => setName(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && name.trim()) onLoad(name.trim()); }}
              style={{
                flex: 1, background: "#111111", border: "1px solid #222222",
                borderRadius: 12, padding: "14px 18px", fontSize: 15,
                color: "#fff", outline: "none", fontFamily: "inherit",
                transition: "border-color 0.2s",
              }}
              onFocus={e => e.target.style.borderColor = "#a855f7"}
              onBlur={e => e.target.style.borderColor = "#222222"}
              autoFocus
            />
            <button
              onClick={() => { if (name.trim()) onLoad(name.trim()); }}
              disabled={!name.trim()}
              style={{
                background: name.trim() ? "linear-gradient(135deg, #a855f7, #7c3aed)" : "#222",
                color: name.trim() ? "#fff" : "#555",
                border: "none", borderRadius: 12, padding: "14px 28px",
                fontSize: 15, fontWeight: 600, cursor: name.trim() ? "pointer" : "default",
                fontFamily: "inherit", transition: "all 0.2s",
              }}
            >Load</button>
          </div>
        </div>
      );
    }

    // ─── Toast ───────────────────────────────────────────
    function Toast({ message, visible }) {
      if (!visible) return null;
      return (
        <div style={{
          position: "fixed", bottom: 32, left: "50%", transform: "translateX(-50%)",
          background: "#22c55e", color: "#000", padding: "10px 24px",
          borderRadius: 10, fontSize: 14, fontWeight: 600, zIndex: 1000,
          animation: "toastIn 0.3s ease", boxShadow: "0 8px 32px rgba(34, 197, 94, 0.3)",
        }}>{message}</div>
      );
    }

    // ─── Tab Navigation ──────────────────────────────────
    function TabBar({ activeTab, onTabChange }) {
      const tabs = [
        { id: "proof", label: "Proof Card" },
        { id: "learning", label: "Learning" },
        { id: "activity", label: "Activity" },
      ];
      return (
        <div style={{
          display: "flex", gap: 0, borderBottom: "1px solid #222222",
          marginBottom: 24, position: "relative",
        }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => onTabChange(t.id)} style={{
              background: "none", border: "none", color: activeTab === t.id ? "#fff" : "#6b7280",
              fontSize: 14, fontWeight: activeTab === t.id ? 600 : 400,
              padding: "12px 20px", cursor: "pointer", fontFamily: "inherit",
              borderBottom: activeTab === t.id ? "2px solid #a855f7" : "2px solid transparent",
              transition: "all 0.2s", marginBottom: -1,
            }}>{t.label}</button>
          ))}
        </div>
      );
    }

    // ─── Proof Card Tab ──────────────────────────────────
    function ProofCardTab({ userScore, proveResults }) {
      const [toastVisible, setToastVisible] = useState(false);
      const score = userScore?.proof_score || 1000;
      const band = userScore?.proof_band || getBandFromScore(score);
      const tier = userScore?.tier || "Explorer";
      const level = userScore?.level || 0;
      const abilities = userScore?.abilities || {};
      const streak = userScore?.streak_days || 0;
      const totalSaves = userScore?.total_saves || 0;
      const totalElevates = userScore?.total_elevates || 0;
      const totalProves = userScore?.total_proves || 0;
      const bandColor = BAND_COLORS[band] || "#cd7f32";
      const tierColor = TIER_COLORS[tier] || "#6b7280";
      const nextBand = getNextBand(band, score);

      // Detect brand new user with no activity
      const isNewUser = totalSaves === 0 && totalElevates === 0 && totalProves === 0 && Object.keys(abilities).length === 0;

      if (isNewUser) {
        return (
          <div style={{ animation: "fadeIn 0.4s ease" }}>
            <div style={{ ...S.card, textAlign: "center", padding: 40 }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>🚀</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: "#fff", marginBottom: 8 }}>
                Welcome to LearnTube
              </div>
              <div style={{ fontSize: 14, color: "#888", lineHeight: 1.6, maxWidth: 340, margin: "0 auto 24px" }}>
                Your AI Readiness profile starts building the moment you use Claude with LearnTube tools.
                Have a real conversation, and your abilities, Proof Score, and level will appear here.
              </div>
              <div style={{ ...S.card, background: "#0a0a0a", padding: 20, textAlign: "left" }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#a855f7", marginBottom: 12 }}>Getting Started</div>
                <div style={{ fontSize: 13, color: "#999", lineHeight: 1.8 }}>
                  1. Open Claude Desktop with LearnTube connected<br />
                  2. Work on any real task — the tools activate automatically<br />
                  3. Come back here to see your profile grow
                </div>
              </div>
            </div>
          </div>
        );
      }

      // Prove results from last 7 days
      const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
      const weekProves = (proveResults || []).filter(r => r.created_at >= weekAgo);
      const proveGrid = weekProves.slice(0, 20).map(r => r.correct);

      // Radar data
      const radarData = Object.entries(ABILITIES)
        .map(([key, name]) => {
          const a = abilities[key];
          return a && a.score != null ? { ability: name, score: Math.round(a.score * 10) / 10, fullMark: 6 } : null;
        })
        .filter(Boolean);
      const hasRadar = radarData.length > 0;

      // Band label
      const bandTitle = band === "Bronze" ? "Developing Eye"
        : band === "Silver" ? "Skeptical Mind"
        : band === "Gold" ? "Sharp Evaluator"
        : band === "Platinum" ? "Artifact Resistant"
        : band === "Diamond" ? "Judgment Elite"
        : "Skeptical Mind";

      function handleShare() {
        const grid = proveGrid.map(c => c ? "\uD83D\uDFE9" : "\uD83D\uDFE5").join("");
        const text = `\uD83E\uDDE0 AI Readiness: Proof Score ${score} (${band}). ${grid || "No proves"} this week. Level ${level} ${LEVEL_NAMES[level]}. Track yours: https://shronit-builds.github.io/learntube-dashboard/ #AIReadiness`;
        navigator.clipboard.writeText(text).then(() => {
          setToastVisible(true);
          setTimeout(() => setToastVisible(false), 2000);
        });
      }

      return (
        <div style={{ animation: "slideUp 0.4s ease" }}>
          {/* Proof Score Hero */}
          <div style={{
            textAlign: "center", padding: "40px 20px 32px",
            background: `radial-gradient(ellipse at 50% 0%, ${bandColor}11 0%, transparent 70%)`,
            borderRadius: 20, border: "1px solid #222222", marginBottom: 20,
          }}>
            <div style={{
              fontSize: 72, fontWeight: 900, lineHeight: 1, color: "#fff",
              letterSpacing: "-2px", marginBottom: 8,
              textShadow: `0 0 60px ${bandColor}33`,
            }}>{score}</div>
            <div style={{
              fontSize: 16, fontWeight: 600, color: bandColor, marginBottom: 6,
            }}>{band} — {bandTitle}</div>
            {nextBand && (
              <div style={{ fontSize: 13, color: "#555", marginTop: 4 }}>
                {nextBand.pointsNeeded} points to {nextBand.name}
              </div>
            )}
          </div>

          {/* Radar Chart */}
          {hasRadar && (
            <div style={{ ...S.card, marginBottom: 20, padding: "24px 12px" }}>
              <div style={{ textAlign: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 13, color: "#6b7280", fontWeight: 500, letterSpacing: "0.05em", textTransform: "uppercase" }}>
                  Ability Profile
                </span>
              </div>
              <ResponsiveContainer width="100%" height={280}>
                <RadarChart data={radarData} cx="50%" cy="50%" outerRadius="72%">
                  <PolarGrid stroke="#222222" strokeDasharray="3 3" />
                  <PolarAngleAxis
                    dataKey="ability"
                    tick={{ fill: "#888", fontSize: 11, fontFamily: "Inter" }}
                  />
                  <PolarRadiusAxis
                    angle={90} domain={[0, 6]}
                    tick={{ fill: "#444", fontSize: 10 }}
                    tickCount={4} axisLine={false}
                  />
                  <Radar
                    name="Score" dataKey="score"
                    stroke="#a855f7" fill="#a855f7" fillOpacity={0.15}
                    strokeWidth={2}
                    dot={{ r: 3, fill: "#a855f7", strokeWidth: 0 }}
                  />
                </RadarChart>
              </ResponsiveContainer>
            </div>
          )}

          {/* Stats Row */}
          <div style={{
            display: "grid",
            gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))",
            gap: 12, marginBottom: 20,
          }}>
            {/* Level Badge */}
            <div style={{
              ...S.cardCompact,
              background: `linear-gradient(135deg, ${tierColor}18, ${tierColor}08)`,
              borderColor: `${tierColor}33`,
              textAlign: "center",
            }}>
              <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Level</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: tierColor }}>L{level}</div>
              <div style={{ fontSize: 12, color: "#aaa", marginTop: 2 }}>{LEVEL_NAMES[level]}</div>
            </div>

            {/* Streak */}
            <div style={{ ...S.cardCompact, textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Streak</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>
                {streak} <span style={{ fontSize: 16 }}>{"\uD83D\uDD25"}</span>
              </div>
            </div>

            {/* This Week's Proves */}
            <div style={{ ...S.cardCompact, textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>This Week</div>
              <div style={{ fontSize: 16, letterSpacing: 2, lineHeight: 1.4 }}>
                {proveGrid.length > 0
                  ? proveGrid.map((c, i) => <span key={i}>{c ? "\uD83D\uDFE9" : "\uD83D\uDFE5"}</span>)
                  : <span style={{ fontSize: 12, color: "#555" }}>No proves yet</span>
                }
              </div>
            </div>

            {/* Total Saves */}
            <div style={{ ...S.cardCompact, textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Saves</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: "#3b82f6" }}>{totalSaves}</div>
            </div>
          </div>

          {/* Share Button */}
          <button onClick={handleShare} style={{
            width: "100%", padding: "16px 24px",
            background: "linear-gradient(135deg, #a855f7, #7c3aed)",
            color: "#fff", border: "none", borderRadius: 14,
            fontSize: 15, fontWeight: 700, cursor: "pointer",
            fontFamily: "inherit", transition: "all 0.2s",
            boxShadow: "0 4px 24px rgba(168, 85, 247, 0.25)",
            letterSpacing: "0.01em",
          }}
            onMouseEnter={e => e.target.style.boxShadow = "0 8px 40px rgba(168, 85, 247, 0.4)"}
            onMouseLeave={e => e.target.style.boxShadow = "0 4px 24px rgba(168, 85, 247, 0.25)"}
          >Share Your Proof Card</button>

          <Toast message="Copied to clipboard!" visible={toastVisible} />
        </div>
      );
    }

    // ─── Learning Queue Tab ──────────────────────────────
    function LearningTab({ userId, queue, setQueue }) {
      const [expanded, setExpanded] = useState(null);
      const [updating, setUpdating] = useState(null);

      const pendingCount = (queue || []).filter(i => i.status === "pending").length;

      async function markReviewed(item) {
        setUpdating(item.id);
        try {
          await patch("learning_queue", item.id, {
            status: "reviewed",
            reviewed_at: new Date().toISOString(),
          });
          setQueue(prev => prev.map(q => q.id === item.id ? { ...q, status: "reviewed" } : q));
        } catch (err) {
          console.error("Failed to update:", err);
        }
        setUpdating(null);
      }

      if (!queue || queue.length === 0) {
        return (
          <div style={{ animation: "slideUp 0.4s ease" }}>
            <div style={{
              ...S.card, textAlign: "center", padding: "64px 24px",
            }}>
              <div style={{ fontSize: 40, marginBottom: 16, opacity: 0.5 }}>{"\uD83D\uDCDA"}</div>
              <p style={{ fontSize: 15, color: "#6b7280", maxWidth: 320, margin: "0 auto", lineHeight: 1.6 }}>
                Your learning queue is empty. Use Claude with LearnTube tools to generate flash cards, exercises, and reviews.
              </p>
            </div>
          </div>
        );
      }

      return (
        <div style={{ animation: "slideUp 0.4s ease" }}>
          <div style={{ marginBottom: 20 }}>
            <span style={{ fontSize: 14, color: "#6b7280" }}>
              <span style={{ fontWeight: 700, color: "#fff" }}>{pendingCount}</span> items waiting
            </span>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {queue.map(item => {
              const isExpanded = expanded === item.id;
              const icon = QUEUE_ICONS[item.type] || "\uD83D\uDCCB";
              const isReviewed = item.status === "reviewed" || item.status === "mastered";

              return (
                <div key={item.id}
                  onClick={() => setExpanded(isExpanded ? null : item.id)}
                  style={{
                    ...S.card,
                    padding: 0, overflow: "hidden",
                    cursor: "pointer",
                    opacity: isReviewed ? 0.5 : 1,
                    transition: "all 0.2s",
                    borderColor: isExpanded ? "#333" : "#222222",
                  }}
                >
                  <div style={{ padding: "16px 20px" }}>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                      <span style={{ fontSize: 20, flexShrink: 0, marginTop: 1 }}>{icon}</span>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                          <span style={{
                            fontSize: 10, fontWeight: 600, textTransform: "uppercase",
                            letterSpacing: "0.08em", color: "#6b7280",
                          }}>{(item.type || "").replace(/_/g, " ")}</span>
                          {item.domain && (
                            <span style={{
                              fontSize: 10, padding: "2px 8px", borderRadius: 6,
                              background: "#1a1a2e", color: "#8888aa", fontWeight: 500,
                            }}>{item.domain}</span>
                          )}
                          {isReviewed && (
                            <span style={{
                              fontSize: 10, padding: "2px 8px", borderRadius: 6,
                              background: "#22c55e18", color: "#22c55e", fontWeight: 600,
                            }}>{"\u2713"} reviewed</span>
                          )}
                        </div>
                        <p style={{
                          fontSize: 14, color: "#e5e5e5", lineHeight: 1.5,
                          wordBreak: "break-word",
                        }}>{item.front}</p>
                        <div style={{ fontSize: 12, color: "#444", marginTop: 6 }}>
                          {timeAgo(item.created_at)}
                        </div>
                      </div>
                    </div>
                  </div>

                  {isExpanded && item.back && (
                    <div style={{
                      padding: "0 20px 16px 52px",
                      borderTop: "1px solid #1a1a1a",
                      paddingTop: 16,
                    }} onClick={e => e.stopPropagation()}>
                      <p style={{
                        fontSize: 14, color: "#aaa", lineHeight: 1.6,
                        whiteSpace: "pre-wrap", wordBreak: "break-word",
                      }}>{item.back}</p>
                      {!isReviewed && (
                        <button
                          onClick={(e) => { e.stopPropagation(); markReviewed(item); }}
                          disabled={updating === item.id}
                          style={{
                            marginTop: 14, padding: "10px 20px",
                            background: updating === item.id ? "#222" : "#22c55e",
                            color: updating === item.id ? "#666" : "#000",
                            border: "none", borderRadius: 10, fontSize: 13,
                            fontWeight: 600, cursor: updating === item.id ? "default" : "pointer",
                            fontFamily: "inherit", transition: "all 0.2s",
                          }}
                        >{updating === item.id ? "Updating..." : "Mark as Reviewed"}</button>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Activity Feed Tab ───────────────────────────────
    function ActivityTab({ saves, elevateResults, proveResults }) {
      const feed = useMemo(() => {
        const items = [];

        (saves || []).forEach(s => {
          items.push({
            type: "save",
            time: s.created_at,
            text: `\uD83D\uDCDD Saved insight in ${s.domain || "general"}: "${truncate(s.insight, 60)}"`,
          });
        });

        (elevateResults || []).forEach(e => {
          const lvlName = LEVEL_NAMES[e.level_estimate] || "";
          items.push({
            type: "elevate",
            time: e.created_at,
            text: `\uD83D\uDCCA Session evaluated: L${e.level_estimate} ${lvlName}. Growth area: ${truncate(e.level_up_move, 60)}`,
          });
        });

        (proveResults || []).forEach(p => {
          const emoji = p.correct ? "\uD83D\uDFE9" : "\uD83D\uDFE5";
          const verb = p.correct ? "Caught" : "Fell for";
          const confStr = p.user_confidence != null ? ` Confidence: ${p.user_confidence}/5` : "";
          items.push({
            type: "prove",
            time: p.created_at,
            text: `${emoji} ${verb} the ${p.challenge_type || "unknown"} trap.${confStr}`,
          });
        });

        items.sort((a, b) => new Date(b.time) - new Date(a.time));
        return items.slice(0, 50);
      }, [saves, elevateResults, proveResults]);

      if (feed.length === 0) {
        return (
          <div style={{ animation: "slideUp 0.4s ease" }}>
            <div style={{
              ...S.card, textAlign: "center", padding: "64px 24px",
            }}>
              <div style={{ fontSize: 40, marginBottom: 16, opacity: 0.5 }}>{"\u23F3"}</div>
              <p style={{ fontSize: 15, color: "#6b7280", maxWidth: 320, margin: "0 auto", lineHeight: 1.6 }}>
                No activity yet. Start using save, elevate, and prove in Claude to see your timeline here.
              </p>
            </div>
          </div>
        );
      }

      return (
        <div style={{ animation: "slideUp 0.4s ease" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
            {feed.map((item, i) => (
              <div key={i} style={{
                display: "flex", alignItems: "flex-start", justifyContent: "space-between",
                gap: 16, padding: "14px 0",
                borderBottom: i < feed.length - 1 ? "1px solid #151515" : "none",
              }}>
                <p style={{
                  fontSize: 13, color: "#999", lineHeight: 1.5,
                  flex: 1, minWidth: 0,
                }}>{item.text}</p>
                <span style={{
                  fontSize: 12, color: "#444", whiteSpace: "nowrap", flexShrink: 0,
                  marginTop: 1,
                }}>{timeAgo(item.time)}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── Share-only Card View (for ?card=xxx) ────────────
    function ShareCardView({ userId }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        async function load() {
          try {
            const [us, pr] = await Promise.all([
              query("user_scores", `user_id=eq.${encodeURIComponent(userId)}&select=*`),
              query("prove_results", `user_id=eq.${encodeURIComponent(userId)}&select=correct,created_at&order=created_at.desc&limit=20`),
            ]);
            setData({ userScore: us?.[0] || null, proveResults: pr || [] });
          } catch (e) { console.error(e); }
          setLoading(false);
        }
        load();
      }, [userId]);

      if (loading) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div className="spinner" />
          </div>
        );
      }

      if (!data?.userScore) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#666" }}>
            No data for "{userId}"
          </div>
        );
      }

      const us = data.userScore;
      const score = us.proof_score || 1000;
      const band = us.proof_band || "Bronze";
      const bandColor = BAND_COLORS[band] || "#cd7f32";
      const tierColor = TIER_COLORS[us.tier] || "#6b7280";
      const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
      const weekProves = data.proveResults.filter(r => r.created_at >= weekAgo);

      return (
        <div style={{
          minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
          padding: 24,
        }}>
          <div style={{
            ...S.card, maxWidth: 400, width: "100%", textAlign: "center",
            background: `radial-gradient(ellipse at 50% 0%, ${bandColor}11 0%, #111111 70%)`,
          }}>
            <div style={{ fontSize: 64, fontWeight: 900, color: "#fff", letterSpacing: "-2px" }}>{score}</div>
            <div style={{ fontSize: 15, fontWeight: 600, color: bandColor, marginBottom: 4 }}>{band}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: tierColor, margin: "12px 0 4px" }}>
              L{us.level} {LEVEL_NAMES[us.level]}
            </div>
            <div style={{ fontSize: 13, color: "#666", marginBottom: 16 }}>{userId}</div>
            {weekProves.length > 0 && (
              <div style={{ fontSize: 18, letterSpacing: 3, marginBottom: 16 }}>
                {weekProves.map((r, i) => <span key={i}>{r.correct ? "\uD83D\uDFE9" : "\uD83D\uDFE5"}</span>)}
              </div>
            )}
            <div style={{ fontSize: 11, color: "#444", marginBottom: 20 }}>LearnTube AI Readiness</div>
            <a
              href={`${window.location.origin}${window.location.pathname}`}
              style={{
                display: "inline-block",
                background: "linear-gradient(135deg, #a855f7, #7c3aed)",
                color: "#fff",
                textDecoration: "none",
                padding: "12px 28px",
                borderRadius: 12,
                fontSize: 14,
                fontWeight: 600,
                fontFamily: "inherit",
                transition: "opacity 0.2s",
              }}
              onMouseEnter={e => e.target.style.opacity = "0.85"}
              onMouseLeave={e => e.target.style.opacity = "1"}
            >Get Your Own Score</a>
          </div>
        </div>
      );
    }

    // ─── Main App ────────────────────────────────────────
    function App() {
      // URL params
      const urlParams = new URLSearchParams(window.location.search);
      const urlUser = urlParams.get("user");
      const urlCard = urlParams.get("card");

      const [userId, setUserId] = useState(() => {
        return urlUser || localStorage.getItem("learntube_user") || "";
      });

      // All hooks must be called before any conditional returns
      const [showShareCard] = useState(!!urlCard);
      const [activeTab, setActiveTab] = useState("proof");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [userScore, setUserScore] = useState(null);
      const [saves, setSaves] = useState([]);
      const [proveResults, setProveResults] = useState([]);
      const [elevateResults, setElevateResults] = useState([]);
      const [queue, setQueue] = useState([]);
      const pollRef = useRef(null);

      const loadData = useCallback(async (uid) => {
        if (!uid) return;
        setLoading(true);
        setError(null);
        try {
          const encoded = encodeURIComponent(uid);
          const [us, sv, pr, ev, lq] = await Promise.all([
            query("user_scores", `user_id=eq.${encoded}&select=*`),
            query("saves", `user_id=eq.${encoded}&select=*&order=created_at.desc&limit=50`),
            query("prove_results", `user_id=eq.${encoded}&select=*&order=created_at.desc&limit=50`),
            query("elevate_results", `user_id=eq.${encoded}&select=*&order=created_at.desc&limit=20`),
            query("learning_queue", `user_id=eq.${encoded}&select=*&order=created_at.desc`),
          ]);
          setUserScore(us?.[0] || null);
          setSaves(sv || []);
          setProveResults(pr || []);
          setElevateResults(ev || []);
          setQueue(lq || []);
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      }, []);

      // Initial load + auto-load from localStorage/URL
      useEffect(() => {
        if (userId) {
          localStorage.setItem("learntube_user", userId);
          loadData(userId);
        }
      }, [userId, loadData]);

      // Polling every 30s when tab is visible
      useEffect(() => {
        if (!userId) return;

        function poll() {
          if (!document.hidden) {
            loadData(userId);
          }
        }

        pollRef.current = setInterval(poll, 30000);
        return () => clearInterval(pollRef.current);
      }, [userId, loadData]);

      function handleLogin(name) {
        setUserId(name);
      }

      function handleLogout() {
        localStorage.removeItem("learntube_user");
        setUserId("");
        setUserScore(null);
        setSaves([]);
        setProveResults([]);
        setElevateResults([]);
        setQueue([]);
      }

      // Share card view (after all hooks)
      if (showShareCard && urlCard) {
        return <ShareCardView userId={urlCard} />;
      }

      // Entry screen if no user
      if (!userId) {
        return <EntryScreen onLoad={handleLogin} />;
      }

      const tier = userScore?.tier || "Explorer";
      const tierColor = TIER_COLORS[tier] || "#6b7280";

      return (
        <div style={{ minHeight: "100vh" }}>
          {/* Header */}
          <div style={{
            position: "sticky", top: 0, zIndex: 50,
            backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
            background: "rgba(10, 10, 10, 0.85)",
            borderBottom: "1px solid #1a1a1a",
          }}>
            <div style={{
              maxWidth: 560, margin: "0 auto", padding: "12px 20px",
              display: "flex", alignItems: "center", justifyContent: "space-between",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{
                  width: 30, height: 30, borderRadius: 8,
                  background: `linear-gradient(135deg, ${tierColor}, ${tierColor}88)`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 12, fontWeight: 800, color: "#fff",
                }}>LT</div>
                <span style={{ fontSize: 13, fontWeight: 600, color: "#fff" }}>LearnTube</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 13, color: "#6b7280" }}>{userId}</span>
                <button onClick={handleLogout} style={{
                  background: "none", border: "1px solid #222",
                  borderRadius: 8, padding: "6px 12px", fontSize: 12,
                  color: "#666", cursor: "pointer", fontFamily: "inherit",
                  transition: "all 0.2s",
                }}
                  onMouseEnter={e => { e.target.style.borderColor = "#444"; e.target.style.color = "#999"; }}
                  onMouseLeave={e => { e.target.style.borderColor = "#222"; e.target.style.color = "#666"; }}
                >Switch</button>
              </div>
            </div>
          </div>

          {/* Content */}
          <div style={{ maxWidth: 560, margin: "0 auto", padding: "20px 20px 60px" }}>
            {/* Error */}
            {error && (
              <div style={{
                background: "#1a0a0a", border: "1px solid #331111",
                borderRadius: 12, padding: 16, marginBottom: 20,
                fontSize: 13, color: "#ef4444",
              }}>Failed to load data: {error}</div>
            )}

            {/* Loading */}
            {loading && !userScore && (
              <div style={{
                display: "flex", alignItems: "center", justifyContent: "center",
                height: 300, gap: 10,
              }}>
                <div className="spinner" />
                <span style={{ fontSize: 14, color: "#666" }}>Loading...</span>
              </div>
            )}

            {/* Loaded content */}
            {(!loading || userScore) && (
              <>
                <TabBar activeTab={activeTab} onTabChange={setActiveTab} />

                {activeTab === "proof" && (
                  <ProofCardTab userScore={userScore} proveResults={proveResults} />
                )}

                {activeTab === "learning" && (
                  <LearningTab userId={userId} queue={queue} setQueue={setQueue} />
                )}

                {activeTab === "activity" && (
                  <ActivityTab
                    saves={saves}
                    elevateResults={elevateResults}
                    proveResults={proveResults}
                  />
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
